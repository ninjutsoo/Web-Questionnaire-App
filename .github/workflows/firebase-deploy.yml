# Deploy to Firebase Hosting + Functions on push to main
name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual run from GitHub Actions tab

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: https://web-app-new-efb66.web.app

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Create functions/.env from GitHub Secrets (required for Firebase params)
      - name: Create functions .env from GitHub Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > functions/.env

      - name: Deploy to Firebase
        run: firebase deploy --only hosting,functions --non-interactive
        env:
          FIREBASE_TOKEN: "${{ secrets.FIREBASE_TOKEN }}"
